<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STNDOUT — Athlete Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080808; color: #ffffff; font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; }
    .logo-slogan { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 4px; margin-bottom: 10px; text-align: center; }
    .logo-slogan span { color: #C9A84C; }
    .logo-line { width: 24px; height: 0.5px; background: rgba(255,255,255,0.1); margin: 0 auto 12px; }
    .logo { font-size: 36px; letter-spacing: 4px; text-align: center; margin-bottom: 48px; }
    .logo-white { color: #ffffff; font-weight: 100; }
    .logo-gold { color: #C9A84C; font-weight: 700; }
    .card { width: 100%; max-width: 400px; border: 0.5px solid rgba(255,255,255,0.08); background: #111111; padding: 32px; text-align: center; }
    .card-label { font-size: 9px; color: rgba(255,255,255,0.25); letter-spacing: 4px; margin-bottom: 12px; }
    .card-title { font-size: 22px; font-weight: 300; color: #ffffff; letter-spacing: 0.5px; margin-bottom: 8px; }
    .card-sub { font-size: 13px; color: rgba(255,255,255,0.3); line-height: 1.6; margin-bottom: 32px; }
    .btn-primary { display: block; width: 100%; border: 0.5px solid #C9A84C; padding: 16px; color: #C9A84C; font-size: 11px; letter-spacing: 4px; text-decoration: none; margin-bottom: 12px; cursor: pointer; background: transparent; }
    .btn-secondary { display: block; width: 100%; border: 0.5px solid rgba(255,255,255,0.12); padding: 16px; color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 3px; text-decoration: none; cursor: pointer; background: transparent; }
    .divider { width: 24px; height: 0.5px; background: rgba(255,255,255,0.08); margin: 0 auto 24px; }
    .footer { margin-top: 32px; font-size: 9px; color: rgba(255,255,255,0.15); letter-spacing: 2px; text-align: center; }
  </style>
</head>
<body>
  <p class="logo-slogan">PLAY. <span>POST.</span> GET DISCOVERED.</p>
  <div class="logo-line"></div>
  <div class="logo">
    <span class="logo-white">STND</span><span class="logo-gold">OUT</span>
  </div>

  <div class="card">
    <p class="card-label">ATHLETE PROFILE</p>
    <div class="divider"></div>
    <h1 class="card-title">Open in STNDOUT</h1>
    <p class="card-sub">Discover this athlete's highlights on STNDOUT — the platform built for athletes who want to get discovered.</p>
    <a id="open-app-btn" class="btn-primary" href="#">OPEN IN APP</a>
    <a href="https://apps.apple.com/app/stndout" class="btn-secondary">DOWNLOAD STNDOUT</a>
  </div>

  <p class="footer">STNDOUT · PLAY. POST. GET DISCOVERED.</p>

  <script>
    const path = window.location.pathname;
    const profileId = path.split('/profile/')[1];
    if (profileId) {
      document.getElementById('open-app-btn').href = 'stndout://profile/' + profileId;
    }

    window.addEventListener('load', () => {
      if (profileId) {
        setTimeout(() => {
          window.location.href = 'stndout://profile/' + profileId;
        }, 500);
      }
    });
  </script>
</body>
</html>
